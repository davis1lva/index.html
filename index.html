<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversário</title>

<style>

body{
margin:0;
height:100vh;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
font-family: Arial;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

h1{
font-size:50px;
}

#text{
font-size:24px;
margin-top:20px;
min-height:40px;
}

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4d6d;
}

.gallery{
margin-top:30px;
display:flex;
gap:15px;
}

.gallery img{
width:120px;
height:120px;
border-radius:15px;
object-fit:cover;
}

.firework{
position:absolute;
font-size:30px;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(2);opacity:0}
}

</style>

</head>

<body>

<h1>🎉 Feliz Aniversário 🎉</h1>

<div id="text"></div>

<button onclick="surpresa()">Clique para ver a surpresa</button>

<div class="gallery">

<img src="68172512-0026-449E-803C-187E585B0D1D.jpeg">
<img src="8d372ef9-213f-4c3f-8d59-cd0ea986c30f.jpeg">
<img src="IMG_3811.jpeg">
<img src="">

</div>

<script>

let msg="Feliz aniversário... Sua lindaaa, vc merece tudo de maravilhoso ❤️";
let i=0;

function digitar(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(digitar,50);
}
}

digitar();

function surpresa(){

alert("Você é incrível e eu não me canso de dizer isso, Te Amo sua chata ❤️");

for(let i=0;i<30;i++){
let fire=document.createElement("div");
fire.classList.add("firework");
fire.innerHTML="🎆";
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";
document.body.appendChild(fire);

setTimeout(()=>{
fire.remove();
},1000);
}

}

</script>

</body>
</html>
