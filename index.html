<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário</title>

<style>

body{
margin:0;
min-height:100vh;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
font-family: Arial;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
color:white;
}

h1{
margin-top:40px;
font-size:40px;
}

#text{
font-size:22px;
margin-top:20px;
}

button{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4d6d;
}

.gallery{
margin-top:30px;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.gallery img{
width:180px;
height:180px;
border-radius:15px;
object-fit:cover;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
cursor:pointer;
}

@media (max-width:600px){
.gallery img{
width:240px;
height:240px;
}
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

</style>

</head>

<body>

<h1>🎉 Feliz Aniversário 🎉</h1>

<div id="text">Feliz aniversário... Sua lindaaa ❤️</div>

<button onclick="alert('Você é incrível e merece tudo de maravilhoso, Te Amo ❤️')">
Clique para ver a surpresa
</button>

<div class="gallery">

<img src="foto0.jpg">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">

</div>

<div id="lightbox" onclick="this.style.display='none'">
<img id="imgGrande">
</div>

<script>

document.querySelectorAll(".gallery img").forEach(img=>{
img.onclick=function(){
document.getElementById("lightbox").style.display="flex";
document.getElementById("imgGrande").src=this.src;
}
});

</script>

</body>
</html>
